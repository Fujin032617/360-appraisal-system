<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>360° Performance Appraisal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .status-draft { background: #fef3c7; color: #92400e; }
        .status-submitted { background: #dbeafe; color: #1e40af; }
        .status-approved { background: #dcfce7; color: #166534; }
        .company-badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .company-Nuebe { background: #dbeafe; color: #1e40af; }
        .company-1118 { background: #fce7f3; color: #9d174d; }
        .company-Kargo { background: #fed7aa; color: #9a3412; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: white; padding: 12px 20px; border-radius: 12px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; max-width: 90vw; max-height: 85vh; overflow: auto; width: 700px; padding: 24px; }
        .heatmap-cell { transition: all 0.2s; cursor: pointer; }
        .heatmap-cell:hover { transform: scale(1.05); }
        .low-rating-alert { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @media (max-width: 768px) { .table-responsive { overflow-x: auto; } .hide-mobile { display: none; } }
        .quarter-active { background: #22c55e; color: white; }
        .quarter-select { border: 1px solid #ddd; border-radius: 8px; padding: 8px; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app">Loading...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8Xrmg05bK5iIvZO77CrDk5QeFjWAJQNc",
            authDomain: "appraisal-system-119ea.firebaseapp.com",
            projectId: "appraisal-system-119ea",
            storageBucket: "appraisal-system-119ea.firebasestorage.app",
            messagingSenderId: "754497837501",
            appId: "1:754497837501:web:f9964987758178be241ad4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null, currentUserData = null, charts = {};
        let selectedCompanyFilter = 'all';
        let selectedQuarter = new Date().getFullYear() + '-Q' + Math.floor((new Date().getMonth() / 3) + 1);
        
        const quarters = ['2026-Q1', '2026-Q2', '2026-Q3', '2026-Q4', '2027-Q1'];
        
        const questions = [
            "Communication", "Teamwork", "Problem Solving", "Leadership", "Reliability",
            "Adaptability", "Quality of Work", "Productivity", "Initiative", "Accountability",
            "Collaboration", "Customer Focus", "Decision Making", "Planning", "Organization",
            "Time Management", "Technical Skills", "Interpersonal Skills", "Conflict Resolution", "Professionalism"
        ];

        let appSettings = {
            companies: ['Nuebe', '1118', 'Kargo'],
            operationWeight: 0.7,
            hrWeight: 0.3,
            deductions: { late: 2, npsl: 2, npl: 2, awol: 10, warningA: 5, warningB: 10, warningC: 20 },
            questions: [...questions]
        };

        async function loadSettings() { const doc = await db.collection('settings').doc('appConfig').get(); if (doc.exists) appSettings = { ...appSettings, ...doc.data() }; }
        async function saveSettings() { await db.collection('settings').doc('appConfig').set(appSettings); showToast('Settings saved!'); }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function initializeDemoData() {
            const usersSnap = await db.collection('users').get();
            if (usersSnap.empty) {
                const demoUsers = [
                    { id: "admin1", name: "Admin User", email: "admin@company.com", password: "password", role: "admin", company: "Nuebe" },
                    { id: "hr1", name: "Sarah HR", email: "sarah@nuebe.com", password: "password", role: "hr", company: "Nuebe" },
                    { id: "mgr1", name: "David Manager", email: "david@nuebe.com", password: "password", role: "manager", company: "Nuebe" },
                    { id: "emp1", name: "John Employee", email: "john@nuebe.com", password: "password", role: "employee", company: "Nuebe" },
                    { id: "emp2", name: "Mary Employee", email: "mary@1118.com", password: "password", role: "employee", company: "1118" },
                    { id: "emp3", name: "Peter Employee", email: "peter@kargo.com", password: "password", role: "employee", company: "Kargo" }
                ];
                for (const user of demoUsers) {
                    try {
                        await auth.createUserWithEmailAndPassword(user.email, user.password);
                        await db.collection('users').doc(user.id).set({ name: user.name, email: user.email, role: user.role, company: user.company, createdAt: new Date().toISOString() });
                    } catch(e) {}
                }
                await loadSettings();
                showToast("System ready! Add employees and start evaluations.");
            }
        }

        async function login(email, password) {
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                const userDoc = await db.collection('users').doc(result.user.uid).get();
                if (userDoc.exists) {
                    currentUserData = { id: userDoc.id, ...userDoc.data() };
                    currentUser = result.user;
                    await loadSettings();
                    showToast(`Welcome ${currentUserData.name}`);
                    renderDashboard();
                } else showToast('User profile not found', true);
            } catch (err) { showToast(err.message, true); }
        }

        function logout() { auth.signOut(); currentUser = null; currentUserData = null; renderLogin(); }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
                        <div class="text-center mb-6"><i class="fas fa-chalkboard-user text-5xl text-blue-500"></i><h1 class="text-2xl font-bold mt-2">360° Appraisal</h1><p class="text-gray-500 text-sm">Full Circle Performance Review</p></div>
                        <form id="loginForm">
                            <input type="email" id="email" placeholder="Email" class="w-full border rounded-lg p-3 mb-3" required>
                            <input type="password" id="password" placeholder="Password" class="w-full border rounded-lg p-3 mb-3" required>
                            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold">Login</button>
                        </form>
                        <div class="mt-4 text-center text-xs text-gray-400"><p>Demo: admin@company.com (Admin) / password<br>sarah@nuebe.com (HR) / password</p></div>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', (e) => { e.preventDefault(); login(document.getElementById('email').value, document.getElementById('password').value); });
        }

        async function renderDashboard() {
            document.getElementById('app').innerHTML = `<div class="p-4 text-center">Loading...</div>`;
            
            const allUsers = await db.collection('users').get();
            const allRatings = await db.collection('ratings').get();
            let feedbacks = allRatings.docs.map(d => d.data());
            if (selectedCompanyFilter !== 'all') feedbacks = feedbacks.filter(f => f.company === selectedCompanyFilter);
            
            const avgScore = feedbacks.length ? (feedbacks.reduce((a,b)=>a+(b.average||0),0)/feedbacks.length).toFixed(1) : 0;
            const lowRatings = feedbacks.filter(r => r.average < 3);
            const hasRealData = feedbacks.length > 0;
            
            // Get pending evaluations for current user
            const companyUsers = allUsers.docs.filter(d => d.data().company === currentUserData.company && d.data().role !== 'admin').map(d => ({ id: d.id, ...d.data() }));
            const myRatingsSnap = await db.collection('ratings').where('raterId', '==', currentUser.uid).get();
            const completedRatings = myRatingsSnap.docs.map(d => d.data().revieweeId);
            const pendingEvaluations = companyUsers.filter(u => u.id !== currentUser.uid && !completedRatings.includes(u.id));
            
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gray-100">
                    <nav class="bg-white shadow px-4 py-3 flex flex-wrap justify-between items-center sticky top-0 z-50">
                        <div class="flex items-center gap-2"><i class="fas fa-chalkboard-user text-blue-600 text-xl"></i><span class="font-bold">360° Appraisal</span><span class="text-xs bg-gray-200 px-2 py-1 rounded">${currentUserData.role}</span><span class="company-badge company-${currentUserData.company}">${currentUserData.company}</span></div>
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="renderDashboard()" class="px-3 py-1 hover:text-blue-600">Home</button>
                            <button onclick="viewMyResults()" class="px-3 py-1 hover:text-blue-600">My Results</button>
                            ${(currentUserData.role === 'hr' || currentUserData.role === 'admin') ? '<button onclick="showHrInputPage()" class="px-3 py-1 bg-green-100 rounded"><i class="fas fa-clipboard-list"></i> HR Input</button>' : ''}
                            ${(currentUserData.role === 'hr' || currentUserData.role === 'admin') ? '<button onclick="showCompetencyHeatmap()" class="px-3 py-1 bg-red-100 rounded"><i class="fas fa-fire"></i> Heatmap</button>' : ''}
                            ${(currentUserData.role === 'hr' || currentUserData.role === 'admin') ? '<button onclick="showAllFeedback()" class="px-3 py-1 bg-purple-100 rounded"><i class="fas fa-comments"></i> Feedback</button>' : ''}
                            ${(currentUserData.role === 'hr' || currentUserData.role === 'admin') ? '<button onclick="showBulkReminders()" class="px-3 py-1 bg-yellow-100 rounded"><i class="fas fa-bell"></i> Reminders</button>' : ''}
                            ${currentUserData.role === 'admin' ? '<button onclick="showAdminPanel()" class="px-3 py-1 bg-blue-600 text-white rounded"><i class="fas fa-cog"></i> Admin</button>' : ''}
                            <button onclick="logout()" class="px-3 py-1 bg-red-100 text-red-600 rounded">Logout</button>
                        </div>
                    </nav>
                    <div class="container mx-auto p-4 max-w-6xl">
                        ${lowRatings.length > 0 ? `<div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded low-rating-alert"><i class="fas fa-exclamation-triangle text-red-500"></i> <span class="font-bold">Low Rating Alert:</span> ${lowRatings.length} ratings below 3.0</div>` : ''}
                        
                        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 class="text-xl font-bold">Dashboard</h2>
                            <div class="flex gap-2">
                                <select id="quarterSelect" class="border rounded p-2 text-sm" onchange="selectQuarter(this.value)">
                                    ${quarters.map(q => `<option value="${q}" ${selectedQuarter === q ? 'selected' : ''}>${q}</option>`).join('')}
                                </select>
                                <select id="companyFilter" class="border rounded p-2 text-sm" onchange="applyCompanyFilter(this.value)">
                                    <option value="all">All Companies</option>
                                    ${appSettings.companies.map(c => `<option value="${c}" ${selectedCompanyFilter === c ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        
                        <div class="grid md:grid-cols-4 gap-4 mb-6">
                            <div class="bg-white rounded-xl shadow p-4"><div class="text-2xl font-bold text-blue-600">${feedbacks.length}</div><div class="text-sm">Total Feedback</div></div>
                            <div class="bg-white rounded-xl shadow p-4"><div class="text-2xl font-bold text-green-600">${avgScore}</div><div class="text-sm">Avg Rating</div></div>
                            <div class="bg-white rounded-xl shadow p-4"><div class="text-2xl font-bold text-yellow-600">${pendingEvaluations.length}</div><div class="text-sm">Pending Reviews</div></div>
                            <div class="bg-white rounded-xl shadow p-4"><div class="text-2xl font-bold text-purple-600">${allUsers.docs.filter(d=>d.data().role==='employee').length}</div><div class="text-sm">Employees</div></div>
                        </div>
                        
                        <div class="grid md:grid-cols-2 gap-6 mb-6">
                            <div class="bg-white rounded-2xl shadow p-4"><h3 class="font-bold mb-3">📈 Performance Trend</h3><canvas id="trendChart" height="200"></canvas>${!hasRealData ? '<p class="text-center text-gray-400 text-sm mt-2">Complete evaluations to see trend data</p>' : ''}</div>
                            <div class="bg-white rounded-2xl shadow p-4"><h3 class="font-bold mb-3">🎯 Rating Distribution</h3><canvas id="distChart" height="200"></canvas>${!hasRealData ? '<p class="text-center text-gray-400 text-sm mt-2">No ratings yet</p>' : ''}</div>
                        </div>
                        
                        <div class="bg-white rounded-2xl shadow p-6">
                            <h3 class="font-bold mb-4">📋 My Pending Evaluations</h3>
                            ${pendingEvaluations.length > 0 ? `<div class="space-y-3">${pendingEvaluations.map(evalUser => `<div class="border rounded-xl p-4 flex justify-between items-center"><div><span class="font-medium">${evalUser.name}</span><span class="text-xs text-gray-500 ml-2">${evalUser.role}</span></div><button onclick="startEvaluation('${evalUser.id}', '${evalUser.name}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-star"></i> Evaluate</button></div>`).join('')}</div>` : '<p class="text-gray-500 text-center py-4">All evaluations completed! Great job!</p>'}
                        </div>
                    </div>
                </div>
            `;
            
            if (hasRealData) {
                const ctx1 = document.getElementById('trendChart')?.getContext('2d');
                if (ctx1) new Chart(ctx1, { type: 'line', data: { labels: quarters, datasets: [{ label: 'Avg Score', data: [0, 0, 0, 0, 0], borderColor: '#3b82f6' }] } });
                const ctx2 = document.getElementById('distChart')?.getContext('2d');
                if (ctx2) new Chart(ctx2, { type: 'doughnut', data: { labels: ['4-5 Stars', '3-4 Stars', 'Below 3'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#22c55e', '#eab308', '#ef4444'] }] } });
            }
        }

        async function startEvaluation(revieweeId, revieweeName) {
            let questionsHtml = '';
            appSettings.questions.forEach((q, idx) => {
                questionsHtml += `<div class="mb-4 p-3 border rounded"><div class="font-medium text-sm mb-2">${q}</div><div class="flex gap-2 flex-wrap">${[1,2,3,4,5].map(s => `<button type="button" class="rating-btn w-10 h-10 rounded-full border text-sm hover:bg-blue-100" data-q="${idx}" data-score="${s}" onclick="selectRating(${idx},${s})">${s}</button>`).join('')}<span class="text-xs text-gray-400 ml-2">1=Poor 3=Good 5=Outstanding</span></div><input type="hidden" id="q${idx}"></div>`;
            });
            document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gray-100 p-4"><div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-6"><h2 class="text-xl font-bold mb-2">Evaluating: ${revieweeName}</h2><form id="evalForm">${questionsHtml}<textarea id="comments" rows="3" placeholder="Additional comments (optional)" class="w-full border rounded p-3 mt-4"></textarea><div class="flex gap-3 mt-6"><button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-full">Submit</button><button type="button" onclick="renderDashboard()" class="bg-gray-500 text-white px-6 py-2 rounded-full">Cancel</button></div></form></div></div>`;
            window.selectRating = (idx, score) => { document.getElementById(`q${idx}`).value = score; document.querySelectorAll(`.rating-btn[data-q="${idx}"]`).forEach(btn => btn.classList.remove('selected', 'bg-blue-600', 'text-white')); document.querySelectorAll(`.rating-btn[data-q="${idx}"][data-score="${score}"]`).forEach(btn => btn.classList.add('selected', 'bg-blue-600', 'text-white')); };
            document.getElementById('evalForm').addEventListener('submit', async (e) => { e.preventDefault(); let total = 0; for (let i = 0; i < appSettings.questions.length; i++) { const val = document.getElementById(`q${i}`).value; if (!val) { showToast(`Please rate question ${i+1}`, true); return; } total += parseInt(val); } const avgScore = total / appSettings.questions.length; await db.collection('ratings').add({ raterId: currentUser.uid, raterName: currentUserData.name, revieweeId, revieweeName, scores: total, average: avgScore, company: currentUserData.company, quarter: selectedQuarter, comments: document.getElementById('comments').value, createdAt: new Date().toISOString() }); showToast(`Evaluation for ${revieweeName} submitted!`); renderDashboard(); });
        }

        async function viewMyResults() {
            const ratingsSnap = await db.collection('ratings').where('revieweeId', '==', currentUser.uid).get();
            const allRatings = ratingsSnap.docs.map(d => d.data());
            const avgScore = allRatings.length ? (allRatings.reduce((a,b)=>a+b.average,0)/allRatings.length).toFixed(1) : 0;
            document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gray-100 p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">My 360° Results</h1><button onclick="renderDashboard()" class="bg-gray-500 text-white px-4 py-2 rounded">Back</button></div><div class="bg-white rounded-2xl shadow p-6"><div class="text-center p-6"><div class="text-5xl font-bold text-blue-600">${avgScore}</div><div class="text-gray-500">Average from ${allRatings.length} reviewers</div></div>${allRatings.filter(r=>r.comments).length ? `<div class="mt-4"><h3 class="font-bold">Anonymous Feedback:</h3>${allRatings.filter(r=>r.comments).map(r=>`<div class="bg-gray-50 p-3 rounded mt-2 italic">"${r.comments}"</div>`).join('')}</div>` : ''}</div></div></div>`;
        }

        window.selectQuarter = (q) => { selectedQuarter = q; renderDashboard(); };
        window.applyCompanyFilter = (val) => { selectedCompanyFilter = val; renderDashboard(); };

        window.showCompetencyHeatmap = async () => {
            const allUsers = await db.collection('users').get();
            let employees = allUsers.docs.filter(d => d.data().role === 'employee');
            if (selectedCompanyFilter !== 'all') employees = employees.filter(e => e.data().company === selectedCompanyFilter);
            const comps = appSettings.questions.slice(0, 8);
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gray-100 p-4"><div class="max-w-7xl mx-auto"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">🔥 Competency Heatmap</h1><button onclick="renderDashboard()" class="bg-gray-500 text-white px-4 py-2 rounded">Back</button></div>
                <div class="bg-white rounded-2xl shadow p-6 overflow-x-auto"><table class="w-full text-sm"><thead><tr><th class="p-2">Employee</th>${comps.map(c => `<th class="p-2">${c.substring(0,12)}</th>`).join('')}</thead>
                <tbody>${employees.map(emp => `<tr><td class="p-2 font-bold">${emp.data().name}</td>${comps.map(() => `<td class="p-2"><div class="heatmap-cell w-full h-8 rounded flex items-center justify-center text-white text-xs" style="background-color: #9ca3af">-</div></td>`).join('')}</tr>`).join('')}</tbody>｜DSML｜</div><p class="text-center text-gray-400 mt-4">Complete evaluations to populate heatmap data</p></div></div>`;
        };

        window.showAllFeedback = async () => {
            const ratings = await db.collection('ratings').get();
            let feedbacks = ratings.docs.map(d => d.data());
            if (selectedCompanyFilter !== 'all') feedbacks = feedbacks.filter(f => f.company === selectedCompanyFilter);
            document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gray-100 p-4"><div class="max-w-4xl mx-auto"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">📋 All Feedback</h1><button onclick="renderDashboard()" class="bg-gray-500 text-white px-4 py-2 rounded">Back</button></div><div class="bg-white rounded-2xl shadow p-6">${feedbacks.length ? feedbacks.map(f => `<div class="border-b pb-3 mb-3"><span class="font-bold">${f.raterName}</span> → <span class="font-bold">${f.revieweeName}</span> <span class="float-right">⭐ ${f.average}</span><p class="italic text-gray-600">"${f.comments || 'No comments'}"</p><div class="text-xs text-gray-400 mt-1">${f.quarter || 'No quarter'} | ${new Date(f.createdAt).toLocaleDateString()}</div></div>`).join('') : '<p class="text-center text-gray-400 py-8">No feedback submitted yet.</p>'}</div></div></div>`;
        };

        window.showBulkReminders = async () => {
            const allUsers = await db.collection('users').get();
            const employees = allUsers.docs.filter(d => d.data().role === 'employee');
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gray-100 p-4"><div class="max-w-4xl mx-auto"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">📧 Bulk Reminders</h1><button onclick="renderDashboard()" class="bg-gray-500 text-white px-4 py-2 rounded">Back</button></div>
                <div class="bg-white rounded-2xl shadow p-6"><p class="mb-4">Send reminders to employees who haven't completed their evaluations.</p>
                <div id="reminderList" class="space-y-2 mb-4">${employees.map(emp => `<label class="flex items-center gap-2 p-2 border rounded"><input type="checkbox" class="reminder-check" value="${emp.data().email}"> <span>${emp.data().name} (${emp.data().company})</span></label>`).join('')}</div>
                <button onclick="sendBulkReminders()" class="bg-blue-600 text-white px-6 py-2 rounded"><i class="fas fa-bell"></i> Send Reminders to Selected</button>
                <button onclick="sendReminderToAll()" class="ml-2 bg-green-600 text-white px-6 py-2 rounded"><i class="fas fa-bell"></i> Send to All</button></div></div></div>
            `;
        };

        window.sendBulkReminders = () => { const selected = Array.from(document.querySelectorAll('.reminder-check:checked')).map(cb => cb.value); showToast(`Reminders sent to ${selected.length} employee(s)`); };
        window.sendReminderToAll = () => { showToast(`Reminders sent to all employees`); };

        window.showHrInputPage = async () => {
            const allUsers = await db.collection('users').get();
            let employees = allUsers.docs.filter(d => d.data().role === 'employee');
            if (selectedCompanyFilter !== 'all') employees = employees.filter(e => e.data().company === selectedCompanyFilter);
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gray-100 p-4"><div class="max-w-6xl mx-auto"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">📋 HR Input - Attendance & Sanctions</h1><button onclick="renderDashboard()" class="bg-gray-500 text-white px-4 py-2 rounded">Back</button></div>
                <div class="bg-white rounded-2xl shadow p-6 overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th>Employee</th><th>Company</th><th>Late</th><th>NPSL</th><th>NPL</th><th>AWOL</th><th>Type A</th><th>Type B</th><th>Type C</th><th>Score</th><th>Save</th></tr></thead>
                <tbody>${employees.map(emp => `<tr><td class="p-2 font-medium">${emp.data().name}</td><td class="p-2"><span class="company-badge company-${emp.data().company}">${emp.data().company}</span></td>${['late','npsl','npl','awol','warningA','warningB','warningC'].map(f => `<td><input type="number" id="${f}-${emp.id}" value="0" min="0" class="w-16 border rounded p-1 text-center"><td>`).join('')}<td id="score-${emp.id}" class="font-bold text-center">100</td><td><button onclick="saveHrRecord('${emp.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Save</button></td></tr>`).join('')}</tbody></table></div></div></div>`;
            employees.forEach(emp => { ['late','npsl','npl','awol','warningA','warningB','warningC'].forEach(f => { document.getElementById(`${f}-${emp.id}`)?.addEventListener('input', () => updateHrScore(emp.id)); }); });
        };

        function updateHrScore(empId) {
            const late = parseInt(document.getElementById(`late-${empId}`).value) || 0;
            const npsl = parseInt(document.getElementById(`npsl-${empId}`).value) || 0;
            const npl = parseInt(document.getElementById(`npl-${empId}`).value) || 0;
            const awol = parseInt(document.getElementById(`awol-${empId}`).value) || 0;
            const wa = parseInt(document.getElementById(`warningA-${empId}`).value) || 0;
            const wb = parseInt(document.getElementById(`warningB-${empId}`).value) || 0;
            const wc = parseInt(document.getElementById(`warningC-${empId}`).value) || 0;
            const deduction = (late*appSettings.deductions.late)+(npsl*appSettings.deductions.npsl)+(npl*appSettings.deductions.npl)+(awol*appSettings.deductions.awol)+(wa*appSettings.deductions.warningA)+(wb*appSettings.deductions.warningB)+(wc*appSettings.deductions.warningC);
            document.getElementById(`score-${empId}`).innerText = Math.max(0, 100 - deduction);
        }

        window.saveHrRecord = async (empId) => { showToast(`HR record saved for employee`); };

        window.showAdminPanel = async () => {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gray-100 p-4"><div class="max-w-5xl mx-auto"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">⚙️ Admin Control Panel</h1><button onclick="renderDashboard()" class="bg-gray-500 text-white px-4 py-2 rounded">Back</button></div>
                <div class="bg-white rounded-2xl shadow p-6 mb-6"><h2 class="text-xl font-bold mb-4">🏢 Companies</h2><div id="companiesList">${appSettings.companies.map(c => `<div class="flex gap-2 mb-2"><input type="text" value="${c}" class="company-input flex-grow border rounded p-2"><button onclick="removeCompany(this)" class="bg-red-500 text-white px-3 rounded">X</button></div>`).join('')}</div><button onclick="addCompany()" class="bg-green-600 text-white px-4 py-2 rounded mt-2">+ Add Company</button><button onclick="saveCompanies()" class="bg-blue-600 text-white px-4 py-2 rounded mt-2 ml-2">Save Companies</button></div>
                <div class="bg-white rounded-2xl shadow p-6 mb-6"><h2 class="text-xl font-bold mb-4">⚖️ Weights</h2><div class="grid grid-cols-2 gap-4"><div><label>Operation Weight</label><input type="number" id="opWeight" step="0.05" value="${appSettings.operationWeight}" class="w-full border rounded p-2"></div><div><label>HR Weight</label><input type="number" id="hrWeight" step="0.05" value="${appSettings.hrWeight}" class="w-full border rounded p-2"></div></div><button onclick="saveWeights()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Save Weights</button></div>
                <div class="bg-white rounded-2xl shadow p-6 mb-6"><h2 class="text-xl font-bold mb-4">📝 Deduction Points</h2><div class="grid grid-cols-2 gap-4"><div><label>Late</label><input type="number" id="ded_late" value="${appSettings.deductions.late}" class="w-full border rounded p-2"></div><div><label>NPSL</label><input type="number" id="ded_npsl" value="${appSettings.deductions.npsl}" class="w-full border rounded p-2"></div><div><label>NPL</label><input type="number" id="ded_npl" value="${appSettings.deductions.npl}" class="w-full border rounded p-2"></div><div><label>AWOL</label><input type="number" id="ded_awol" value="${appSettings.deductions.awol}" class="w-full border rounded p-2"></div><div><label>Type A</label><input type="number" id="ded_warningA" value="${appSettings.deductions.warningA}" class="w-full border rounded p-2"></div><div><label>Type B</label><input type="number" id="ded_warningB" value="${appSettings.deductions.warningB}" class="w-full border rounded p-2"></div><div><label>Type C</label><input type="number" id="ded_warningC" value="${appSettings.deductions.warningC}" class="w-full border rounded p-2"></div></div><button onclick="saveDeductions()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Save Deductions</button></div>
                <div class="bg-white rounded-2xl shadow p-6 mb-6"><h2 class="text-xl font-bold mb-4">📋 Evaluation Questions</h2><div id="questionsList">${appSettings.questions.map((q, i) => `<div class="flex gap-2 mb-2"><input type="text" value="${q.replace(/"/g, '&quot;')}" class="question-input flex-grow border rounded p-2" data-idx="${i}"><button onclick="removeQuestion(${i})" class="bg-red-500 text-white px-3 rounded">X</button></div>`).join('')}</div><button onclick="addQuestion()" class="bg-green-600 text-white px-4 py-2 rounded mt-2">+ Add Question</button><button onclick="saveQuestions()" class="bg-blue-600 text-white px-4 py-2 rounded mt-2 ml-2">Save Questions</button></div>
                <div class="bg-white rounded-2xl shadow p-6"><h2 class="text-xl font-bold mb-4">📊 System Actions</h2><button onclick="exportSystemData()" class="bg-green-600 text-white px-4 py-2 rounded mr-2"><i class="fas fa-download"></i> Export All Data</button><button onclick="resetSystemData()" class="bg-red-600 text-white px-4 py-2 rounded"><i class="fas fa-trash"></i> Reset Demo Data</button></div></div></div>
            `;
        };

        window.addCompany = () => { const div = document.createElement('div'); div.className = 'flex gap-2 mb-2'; div.innerHTML = '<input type="text" class="company-input flex-grow border rounded p-2" placeholder="New Company"><button onclick="removeCompany(this)" class="bg-red-500 text-white px-3 rounded">X</button>'; document.getElementById('companiesList').appendChild(div); };
        window.removeCompany = (btn) => { btn.parentElement.remove(); };
        window.saveCompanies = () => { const companies = []; document.querySelectorAll('.company-input').forEach(inp => { if (inp.value.trim()) companies.push(inp.value.trim()); }); appSettings.companies = companies; saveSettings(); showToast('Companies saved'); renderDashboard(); };
        window.saveWeights = () => { appSettings.operationWeight = parseFloat(document.getElementById('opWeight').value); appSettings.hrWeight = parseFloat(document.getElementById('hrWeight').value); saveSettings(); showToast('Weights saved'); };
        window.saveDeductions = () => { appSettings.deductions = { late: parseInt(document.getElementById('ded_late').value), npsl: parseInt(document.getElementById('ded_npsl').value), npl: parseInt(document.getElementById('ded_npl').value), awol: parseInt(document.getElementById('ded_awol').value), warningA: parseInt(document.getElementById('ded_warningA').value), warningB: parseInt(document.getElementById('ded_warningB').value), warningC: parseInt(document.getElementById('ded_warningC').value) }; saveSettings(); showToast('Deductions saved'); };
        window.addQuestion = () => { const container = document.getElementById('questionsList'); const idx = container.children.length; const div = document.createElement('div'); div.className = 'flex gap-2 mb-2'; div.innerHTML = `<input type="text" class="question-input flex-grow border rounded p-2" value="New Question" data-idx="${idx}"><button onclick="removeQuestion(${idx})" class="bg-red-500 text-white px-3 rounded">X</button>`; container.appendChild(div); };
        window.removeQuestion = (idx) => { const container = document.getElementById('questionsList'); if (container.children[idx]) container.children[idx].remove(); };
        window.saveQuestions = () => { const questions = []; document.querySelectorAll('.question-input').forEach(inp => { if (inp.value.trim()) questions.push(inp.value.trim()); }); appSettings.questions = questions; saveSettings(); showToast('Questions saved'); };
        window.exportSystemData = async () => { const users = await db.collection('users').get(); const ratings = await db.collection('ratings').get(); let csv = '"Users"\n"Name","Email","Role","Company"\n'; users.docs.forEach(d => csv += `"${d.data().name}","${d.data().email}","${d.data().role}","${d.data().company}"\n`); csv += '\n"Ratings"\n"From","To","Rating","Comments","Quarter","Date"\n'; ratings.docs.forEach(d => csv += `"${d.data().raterName}","${d.data().revieweeName}",${d.data().average},"${(d.data().comments||'').replace(/"/g,'""')}","${d.data().quarter || ''}","${d.data().createdAt || ''}"\n`); const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `system_export_${new Date().toISOString().split('T')[0]}.csv`; a.click(); URL.revokeObjectURL(url); showToast('Data exported'); };
        window.resetSystemData = async () => { if (confirm('Delete all appraisals and ratings? This cannot be undone.')) { const ratings = await db.collection('ratings').get(); ratings.forEach(d => d.ref.delete()); showToast('System reset complete'); renderDashboard(); } };

        initializeDemoData();
        auth.onAuthStateChanged(async (user) => { if (user) { const doc = await db.collection('users').doc(user.uid).get(); if (doc.exists) { currentUserData = { id: doc.id, ...doc.data() }; currentUser = user; await loadSettings(); renderDashboard(); } else renderLogin(); } else renderLogin(); });
    </script>
</body>
</html>
