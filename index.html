                    { text: "17. Respect and be polite to individuals", type: "rating" },
                    { text: "18. Respect the individual's Privacy and Highly protect the confidentiality of Company and Clients' Information", type: "rating" },
                    { text: "19. With integrity and Honesty, not Slanderous", type: "rating" },
                    { text: "20. Acted with Fairness, Trustworthy", type: "rating" }
                ],
                managerQuestions: [
                    { text: "1. Strategic Thinking & Planning", type: "rating" },
                    { text: "2. Team Leadership & Development", type: "rating" },
                    { text: "3. Decision Making & Problem Solving", type: "rating" },
                    { text: "4. Communication & Influence", type: "rating" },
                    { text: "5. Conflict Resolution", type: "rating" },
                    { text: "6. Delegation & Empowerment", type: "rating" },
                    { text: "7. Performance Management", type: "rating" },
                    { text: "8. Change Management", type: "rating" },
                    { text: "9. Emotional Intelligence", type: "rating" },
                    { text: "10. Accountability & Ownership", type: "rating" },
                    { text: "11. Coaching & Mentoring", type: "rating" },
                    { text: "12. Resource Management", type: "rating" },
                    { text: "13. Innovation & Creativity", type: "rating" },
                    { text: "14. Stakeholder Management", type: "rating" },
                    { text: "15. Ethical Conduct & Integrity", type: "rating" }
                ]
            };

            function migrateQuestions(arr) {
                if (!Array.isArray(arr)) return arr;
                return arr.map(q => typeof q === 'string' ? { text: q, type: 'rating' } : q);
            }

            // HR and Admin can see rater identity AND see all companies
            function canSeeRaterIdentity() {
                return currentUserData && (currentUserData.role === 'hr' || currentUserData.role === 'admin');
            }

            // HR sees ALL companies (single HR for all companies)
            function isHrOrAdmin() {
                return currentUserData && (currentUserData.role === 'hr' || currentUserData.role === 'admin');
            }

            function getCurrentQuarter() { const d = new Date(); return `${d.getFullYear()}-Q${Math.floor(d.getMonth()/3)+1}`; }

            function generateQuarterOptions() {
                const y = new Date().getFullYear();
                const qs = [];
                for(let yr = y - 5; yr <= y + 2; yr++) {
                    for(let q = 1; q <= 4; q++) qs.push(`${yr}-Q${q}`);
                }
                return qs;
            }
            function getLastNQuarters(n=4) { const cur = getCurrentQuarter(); const all = generateQuarterOptions(); const idx = all.indexOf(cur); if(idx===-1) return all.slice(0,n); return all.slice(Math.max(0, idx-n+1), idx+1); }

            function showToast(msg, isErr=false) {
                const t = document.createElement('div');
                t.className = `toast ${isErr?'error':''}`;
                t.innerText = msg;
                document.body.appendChild(t);
                setTimeout(()=>t.remove(),3000);
            }

            function showLoading(id='app') {
                const container = document.getElementById(id);
                if (!container) return;
                if (currentUserData && typeof renderNavbar === 'function') {
                    container.innerHTML = `
                        ${renderNavbar('loading')}
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;">
                            <div class="loading-spinner"></div>
                            <p style="color:#7dd3fc;margin-top:12px;font-size:14px;">Loading...</p>
                        </div>`;
                } else {
                    container.innerHTML = `
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;">
                            <div class="loading-spinner"></div>
                            <p style="color:#7dd3fc;margin-top:12px;font-size:14px;">Loading...</p>
                        </div>`;
                }
            }

            async function loadSettings() {
                try {
                    const d = await db.collection('settings').doc('appConfig').get();
                    if(d.exists) {
                        const data = d.data();
                        if(data.companies) appSettings.companies = data.companies;
                        if(data.operationWeight !== undefined) appSettings.operationWeight = data.operationWeight;
                        if(data.hrWeight !== undefined) appSettings.hrWeight = data.hrWeight;
                        if(data.deductions) appSettings.deductions = data.deductions;
                        if(data.employeeQuestions) {
                            appSettings.employeeQuestions = migrateQuestions(data.employeeQuestions);
                        } else if(data.questions) {
                            appSettings.employeeQuestions = migrateQuestions(data.questions);
                        }
                        if(data.managerQuestions) {
                            appSettings.managerQuestions = migrateQuestions(data.managerQuestions);
                        }
                    } else {
                        await saveSettings();
                    }
                } catch(e) { console.error('Settings load error', e); }
            }
            async function saveSettings() { await db.collection('settings').doc('appConfig').set(appSettings); showToast('Settings saved'); }

            // ── NOTIFICATIONS ──
            async function fetchNotifications() {
                if(!currentUser) return;
                try {
                    const snap = await db.collection('notifications').where('userId','==',currentUser.uid).orderBy('createdAt','desc').limit(20).get();
                    notifications = snap.docs.map(d=>({id:d.id,...d.data()}));
                } catch(e) {
                    const snap = await db.collection('notifications').where('userId','==',currentUser.uid).get();
                    notifications = snap.docs.map(d=>({id:d.id,...d.data()}));
                    notifications.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
                    notifications = notifications.slice(0,20);
                }
                unreadNotificationCount = notifications.filter(n=>!n.read).length;
                updateBadge();
            }
            async function createNotification(uid, msg, type='info', link='#') {
                await db.collection('notifications').add({ userId:uid, message:msg, type, link, read:false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                if(uid===currentUser?.uid) { await fetchNotifications(); }
            }
            async function markRead(id) { await db.collection('notifications').doc(id).update({read:true}); await fetchNotifications(); }
            function updateBadge() { const b = document.getElementById('notificationBadge'); if(b) { b.innerText = unreadNotificationCount; b.style.display = unreadNotificationCount>0?'flex':'none'; } }

            window.toggleNotificationDropdown = function() {
                const dd = document.getElementById('notificationDropdown');
                if(!dd) return;
                const isHidden = dd.classList.contains('hidden');
                dd.classList.toggle('hidden');
                if(isHidden) {
                    const cont = document.getElementById('notificationList');
                    if(cont) cont.innerHTML = notifications.length
                        ? notifications.map(n=>`<div class="notification-item ${n.read?'':'unread'}" onclick="handleNotificationClick('${n.id}','${n.link||''}')">
                            <div style="display:flex;gap:10px;align-items:flex-start;">
                                <i class="fas fa-${n.type==='success'?'check-circle" style="color:#34d399':n.type==='warning'?'exclamation-triangle" style="color:#fbbf24':'info-circle" style="color:#38bdf8'}" style="margin-top:2px;"></i>
                                <div style="flex:1;">
                                    <p style="font-size:13px;color:#cbd5e1;margin:0 0 3px;">${n.message}</p>
                                    <span style="font-size:11px;color:#475569;">${n.createdAt?new Date(n.createdAt.seconds*1000).toLocaleString():'Just now'}</span>
                                </div>
                            </div>
                          </div>`).join('')
                        : '<p style="padding:20px;text-align:center;color:#475569;font-size:14px;">No notifications</p>';
                }
            };
            window.handleNotificationClick = async function(id, link) {
                await markRead(id);
                if(link && link !== '#') {
                    if(link==='myresults') viewMyResults();
                    else if(link.startsWith('user/')) viewUserDetails(link.split('/')[1]);
                    else renderDashboard();
                }
                const dd = document.getElementById('notificationDropdown');
                if(dd && !dd.classList.contains('hidden')) dd.classList.add('hidden');
            };

            // ── AUTH ──
            async function createUser(email, password, name, company, role) {
                const secondaryAppName = 'secondary-' + Date.now();
                let secondaryApp;
                try {
                    secondaryApp = firebase.initializeApp(firebase.app().options, secondaryAppName);
                    const secondaryAuth = secondaryApp.auth();
                    const result = await secondaryAuth.createUserWithEmailAndPassword(email, password);
                    const newUid = result.user.uid;
                    await secondaryAuth.signOut();
                    await new Promise(r => setTimeout(r, 200));
                    await secondaryApp.delete();
                    await db.collection('users').doc(newUid).set({
                        name, email, role, company,
                        createdAt: new Date().toISOString(),
                        createdBy: currentUserData?.name || 'System'
                    });
                    return newUid;
                } catch(err) {
                    showToast(err.message, true);
                    if(secondaryApp) {
                        try { await secondaryApp.delete(); } catch(e) {}
                    }
                    throw err;
                }
            }

            async function login(email, password) {
                try {
                    const res = await auth.signInWithEmailAndPassword(email, password);
                    const doc = await db.collection('users').doc(res.user.uid).get();
                    if(doc.exists) {
                        currentUserData = { id: doc.id, ...doc.data() };
                        currentUser = res.user;
                        await loadSettings();
                        await fetchNotifications();
                        showToast(`Welcome ${currentUserData.name}`);
                        renderDashboard();
                    } else { await auth.signOut(); showToast('Profile not found',true); }
                } catch(e) { showToast(e.message,true); }
            }

                            </button>

            // ── USER DIRECTORY ──
            // HR sees all companies; manager sees only their own company
            async function renderUserDirectory() {
                try {
                    showLoading(); await fetchNotifications();

                    const allR = await db.collection('ratings').get();
                    const scores = {};
                    allR.docs.forEach(r=>{ const d=r.data(); if(d.average !== undefined){ if(!scores[d.revieweeId]) scores[d.revieweeId]={total:0,count:0}; scores[d.revieweeId].total+=d.average; scores[d.revieweeId].count++; } });
                    const users = allU.docs.map(d=>{ const data=d.data(); const sc=scores[d.id]; return {id:d.id,...data,avgScore:sc&&sc.count?(sc.total/sc.count).toFixed(1):'N/A',reviewCount:sc?sc.count:0}; });

                    let filtered = users;

                                    ${canCreate?`<button onclick="showCreateUserModal()" style="background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 0 14px rgba(16,185,129,0.25);"><i class="fas fa-plus" style="margin-right:6px;"></i>Add User</button>`:''}

                }

            window.renderUserDirectory = renderUserDirectory;

            window.deleteUserAccount = async (id) => {
                const allAdmins = await db.collection('users').where('role','==','admin').get();
                if(allAdmins.size===1&&allAdmins.docs[0].id===id) return showToast('Cannot delete the last admin account.',true);
                if(!confirm('Delete this user and all associated data permanently?')) return;
                showLoading();
                const rev = await db.collection('ratings').where('revieweeId','==',id).get();
                const rat = await db.collection('ratings').where('raterId','==',id).get();
                const allDocs = [...rev.docs,...rat.docs];
                for(let i=0;i<allDocs.length;i+=400){
                    const batch = db.batch();
                    allDocs.slice(i,i+400).forEach(d=>batch.delete(d.ref));
                    await batch.commit();

                            <div style="background:rgba(0,100,255,0.08);border:1px solid rgba(0,150,255,0.2);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#93c5fd;">

            // ── EVALUATION FORM ──
            window.selectRating = function(i,s) {

            window.startEvaluation = async (rid, rname, rrole) => {
                if(rid===currentUser.uid) return showToast('Cannot self-evaluate',true);
                let questionSet = (rrole==='manager'||rrole==='hr') ? appSettings.managerQuestions : appSettings.employeeQuestions;
                questionSet = migrateQuestions(questionSet);

                let qHtml = '';
                questionSet.forEach((q,i)=>{
                    const isParagraph = q.type === 'paragraph';
                    if(isParagraph) {
                        qHtml += `<div style="margin-bottom:16px;padding:16px;border:1px solid rgba(168,85,247,0.25);border-radius:12px;background:rgba(168,85,247,0.04);">

                            <input type="hidden" id="q${i}" value="">

                    }
                });

                const legendHtml = `<div style="background:rgba(0,120,255,0.06);border:1px solid rgba(0,150,255,0.18);border-radius:10px;padding:10px 14px;margin-bottom:20px;font-size:12px;color:#7dd3fc;">

                </div>`;

                document.getElementById('app').innerHTML = `
                <div style="min-height:100vh;padding:24px 16px;">

                                    <i class="fas fa-check" style="margin-right:8px;"></i>Submit Anonymously

                                </div>

                            </div>
                            <div style="background:rgba(13,22,45,0.72);backdrop-filter:blur(14px);border:1px solid rgba(0,150,255,0.2);border-radius:16px;padding:32px;">

                                <div style="text-align:center;padding:24px;">
                                    <div style="font-size:64px;font-weight:700;color:#00bfff;filter:drop-shadow(0 0 18px rgba(0,191,255,0.4));">${avg}</div>
                                    <div style="color:#64748b;margin-top:8px;font-size:14px;">Average score from ${ratingReviews.length} anonymous reviewer${ratingReviews.length!==1?'s':''}</div>
                                    <div style="margin-top:12px;font-size:12px;color:#334155;">${RATING_SCALE_LEGEND}</div>
                                </div>` : `<div style="text-align:center;padding:24px;color:#475569;font-size:14px;">No rated feedback yet.</div>`}

                const span = document.getElementById(`score-${empId}`);

                const listId = type==='employee' ? 'employeeQuestionsList' : 'managerQuestionsList';

                const newContainer = container.cloneNode(true);
                container.parentNode.replaceChild(newContainer, container);

                newContainer.addEventListener('click', function(e) {
                    const item = e.target.closest('.question-item');
                    if(!item) return;
                    const items = [...newContainer.querySelectorAll('.question-item')];
                    const liveIdx = items.indexOf(item);

                    if(e.target.closest('button[title="Toggle question type"]')) {
                        const btn = e.target.closest('button[title="Toggle question type"]');
                        const currentType = btn.dataset.qtype;
                        const newType = currentType === 'paragraph' ? 'rating' : 'paragraph';
                        btn.dataset.qtype = newType;
                        btn.innerHTML = `<i class="fas fa-${newType==='paragraph'?'paragraph':'star'}" style="margin-right:4px;"></i>${newType==='paragraph'?'Paragraph':'Rating'}`;

                                        <div style="display:flex;gap:8px;">
                                            <button onclick="addQuestion('manager','rating')" style="background:linear-gradient(135deg,#0055b3,#00bfff);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;"><i class="fas fa-star" style="margin-right:4px;"></i>Add Rating</button>
                                            <button onclick="addQuestion('manager','paragraph')" style="background:linear-gradient(135deg,#6d28d9,#a855f7);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;"><i class="fas fa-paragraph" style="margin-right:4px;"></i>Add Paragraph</button>
                                        </div>
                                    </div>
                                    <div id="managerQuestionsList" style="display:flex;flex-direction:column;gap:0;">${renderQuestionListHTML('manager')}</div>
                                </div>
                                <div style="margin-top:20px;display:flex;gap:12px;">
                                    <button onclick="saveQuestionsFromUI()" style="background:linear-gradient(135deg,#0055b3,#00bfff);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;"><i class="fas fa-save" style="margin-right:8px;"></i>Save Changes</button>
                                    <button onclick="renderDashboard()" style="background:rgba(255,255,255,0.07);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 22px;font-size:14px;cursor:pointer;">Cancel</button>
                                </div>
                                <p style="font-size:12px;color:#334155;margin-top:10px;"><i class="fas fa-grip-vertical" style="margin-right:4px;"></i>Drag to reorder. Click the type badge to toggle Rating ↔ Paragraph. Click Save to apply.</p>
                            </div>
                        </div>
                    </div>`;
                    attachQuestionListHandlers('employee');
                    attachQuestionListHandlers('manager');
                } catch(e) {
                    console.error(e);
                    showToast('Failed to load question manager: ' + e.message, true);
                    document.getElementById('app').innerHTML = `${renderNavbar('questions')}<div style="text-align:center;padding:40px;color:#fca5a5;">Error loading question manager. <button onclick="showQuestionManager()" style="margin-top:12px;background:rgba(0,191,255,0.15);color:#00bfff;border:1px solid rgba(0,191,255,0.3);border-radius:8px;padding:8px 16px;cursor:pointer;">Retry</button></div>`;
                }
            };

            window.switchQuestionTab = (type) => {
                document.getElementById('employeeQuestionsPanel').classList.toggle('hidden',type!=='employee');
                document.getElementById('managerQuestionsPanel').classList.toggle('hidden',type!=='manager');
                document.getElementById('tabEmployee').style.cssText = `padding:9px 18px;border-radius:10px;border:none;font-weight:600;font-size:13px;cursor:pointer;background:${type==='employee'?'linear-gradient(135deg,#0055b3,#00bfff)':'rgba(255,255,255,0.07)'};color:${type==='employee'?'#fff':'#94a3b8'};`;
                document.getElementById('tabManager').style.cssText = `padding:9px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);font-size:13px;cursor:pointer;font-weight:600;background:${type==='manager'?'linear-gradient(135deg,#0055b3,#00bfff)':'rgba(255,255,255,0.07)'};color:${type==='manager'?'#fff':'#94a3b8'};`;
            };

            window.addQuestion = (type, qtype='rating') => {
                const listId = type==='employee' ? 'employeeQuestionsList' : 'managerQuestionsList';
                const container = document.getElementById(listId);
                if(!container) return;
                const isParagraph = qtype === 'paragraph';
                const newItem = document.createElement('div');
                newItem.className='question-item';
                newItem.style.cssText='display:flex;align-items:center;gap:10px;';
                newItem.draggable=true;
                newItem.dataset.type=type;
                newItem.innerHTML=`
                    <span class="drag-handle" style="padding:0 6px;cursor:grab;"><i class="fas fa-grip-vertical" style="color:#334155;"></i></span>
                    <input type="text" value="New ${isParagraph?'Paragraph':'Rating'} Question" style="flex:1;padding:8px 12px;font-size:13px;">
                    <button type="button" title="Toggle question type" data-qtype="${qtype}"
                        style="white-space:nowrap;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${isParagraph?'rgba(168,85,247,0.2)':'rgba(0,191,255,0.15)'};color:${isParagraph?'#d8b4fe':'#38bdf8'};">
                        <i class="fas fa-${isParagraph?'paragraph':'star'}" style="margin-right:4px;"></i>${isParagraph?'Paragraph':'Rating'}
                    </button>
                    <button type="button" class="delete-q-btn" style="background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:6px 10px;cursor:pointer;"><i class="fas fa-trash"></i></button>`;
                container.appendChild(newItem);
                setupDragListeners(newItem);
                reindexQuestions(type);
                newItem.querySelector('input').focus();
                newItem.querySelector('input').select();
            };

            function reindexQuestions(type) {
                const listId = type==='employee' ? 'employeeQuestionsList' : 'managerQuestionsList';
                const container = document.getElementById(listId);
                if(!container) return;
                container.querySelectorAll('.question-item').forEach((item,newIdx)=>{
                    item.dataset.index = newIdx;
                    const input = item.querySelector('input[type="text"]');
                    if(input) input.dataset.qindex = newIdx;
                });
            }

            function setupDragAndDrop(type) {
                const listId = type==='employee' ? 'employeeQuestionsList' : 'managerQuestionsList';
                const container = document.getElementById(listId);
                if(!container) return;
                container.querySelectorAll('.question-item').forEach(item=>setupDragListeners(item));
            }

            function setupDragListeners(el) {
                el.addEventListener('dragstart',(e)=>{ e.dataTransfer.setData('text/plain',JSON.stringify({type:el.dataset.type,index:el.dataset.index})); el.classList.add('dragging'); });
                el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); });
            }
            window.handleDrop = (e, targetType) => {
                e.preventDefault();
                try {
                    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                    if(data.type!==targetType) return;
                    const listId = targetType==='employee' ? 'employeeQuestionsList' : 'managerQuestionsList';
                    const container = document.getElementById(listId);
                    if(!container) return;
                    const items = [...container.querySelectorAll('.question-item')];
                    const dragIndex = parseInt(data.index);
                    const dropTarget = e.target.closest('.question-item');
                    if(!dropTarget) return;
                    const dropIndex = parseInt(dropTarget.dataset.index);
                    if(dragIndex===dropIndex) return;
                    if(dragIndex<dropIndex) { dropTarget.parentNode.insertBefore(items[dragIndex],dropTarget.nextSibling); }
                    else { dropTarget.parentNode.insertBefore(items[dragIndex],dropTarget); }
                    reindexQuestions(targetType);
                } catch(err) { console.error('Drop error',err); }
            };

            window.saveQuestionsFromUI = () => {
                ['employee','manager'].forEach(type => {
                    const listId = type==='employee' ? 'employeeQuestionsList' : 'managerQuestionsList';
                    const container = document.getElementById(listId);
                    if(!container) return;
                    const items = [...container.querySelectorAll('.question-item')];
                    const questions = items.map(item => {
                        const input = item.querySelector('input[type="text"]');
                        const toggleBtn = item.querySelector('button[title="Toggle question type"]');
                        const text = input ? input.value.trim() : '';
                        const qtype = toggleBtn ? toggleBtn.dataset.qtype : 'rating';
                        return { text, type: qtype };
                    }).filter(q => q.text.length > 0);
                    if(type==='employee') appSettings.employeeQuestions = questions;
                    else appSettings.managerQuestions = questions;
                });
                saveSettings();
            };

            // ── ADMIN PANEL ──
            window.showAdminPanel = async () => {
                try {
                    await fetchNotifications();
                    const sectionStyle = `background:rgba(13,22,45,0.72);backdrop-filter:blur(14px);border:1px solid rgba(0,150,255,0.2);border-radius:16px;padding:24px;margin-bottom:20px;`;
                    const labelStyle = `display:block;color:#64748b;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;`;
                    const inputStyle = `width:100%;padding:10px 14px;font-size:14px;border-radius:10px;`;
                    document.getElementById('app').innerHTML = `
                    <div style="min-height:100vh;">
                        ${renderNavbar('admin')}
                        <div style="max-width:1000px;margin:0 auto;padding:24px 16px;">
                            <h1 style="font-size:22px;font-weight:700;color:#e2e8f0;margin-bottom:20px;">⚙️ Admin Control Panel</h1>

                            <div style="${sectionStyle}">
                                <h2 style="font-size:18px;font-weight:700;color:#7dd3fc;margin-bottom:12px;">📤 Bulk Import Users (CSV)</h2>
                                <p style="font-size:13px;color:#64748b;margin-bottom:14px;">CSV columns: Name, Email, Role, Company, Password (optional — defaults to "password123")</p>
                                <input type="file" id="csvFileInput" accept=".csv" style="margin-bottom:12px;color:#94a3b8;font-size:13px;">
                                <br>
                                <button onclick="importUsersFromCSV()" style="background:linear-gradient(135deg,#0055b3,#00bfff);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Import Users</button>
                                <div id="importResult" style="margin-top:12px;font-size:13px;"></div>
                            </div>

                            <div style="${sectionStyle}">
                                <h2 style="font-size:18px;font-weight:700;color:#7dd3fc;margin-bottom:14px;">🏢 Companies</h2>
                                <div id="companiesList">${appSettings.companies.map(c=>`<div style="display:flex;gap:10px;margin-bottom:10px;"><input type="text" value="${c}" class="company-input" style="${inputStyle}"><button onclick="removeCompany(this)" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:6px 12px;cursor:pointer;white-space:nowrap;">✕</button></div>`).join('')}</div>
                                <div style="display:flex;gap:10px;margin-top:6px;">
                                    <button onclick="addCompany()" style="background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;">+ Add Company</button>
                                    <button onclick="saveCompanies()" style="background:linear-gradient(135deg,#0055b3,#00bfff);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;">Save Companies</button>
                                </div>
                            </div>

                            <div style="${sectionStyle}">
                                <h2 style="font-size:18px;font-weight:700;color:#7dd3fc;margin-bottom:6px;">⚖️ Score Weights</h2>
                                <p style="font-size:13px;color:#64748b;margin-bottom:14px;">Both weights must add up to 1.0 (e.g. 0.7 + 0.3 = 1.0)</p>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                                    <div><label style="${labelStyle}">Operation (Peer) Weight</label><input type="number" id="opWeight" step="0.05" min="0" max="1" value="${appSettings.operationWeight}" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">HR Weight</label><input type="number" id="hrWeight" step="0.05" min="0" max="1" value="${appSettings.hrWeight}" style="${inputStyle}"></div>
                                </div>
                                <button onclick="saveWeights()" style="margin-top:14px;background:linear-gradient(135deg,#0055b3,#00bfff);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Save Weights</button>
                            </div>

                            <div style="${sectionStyle}">
                                <h2 style="font-size:18px;font-weight:700;color:#7dd3fc;margin-bottom:14px;">📝 Deduction Points per Incident</h2>
                                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;">
                                    <div><label style="${labelStyle}">Late</label><input type="number" id="ded_late" value="${appSettings.deductions.late}" min="0" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">NPSL (No Pay Short Leave)</label><input type="number" id="ded_npsl" value="${appSettings.deductions.npsl}" min="0" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">NPL (No Pay Leave)</label><input type="number" id="ded_npl" value="${appSettings.deductions.npl}" min="0" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">AWOL</label><input type="number" id="ded_awol" value="${appSettings.deductions.awol}" min="0" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">Warning Type A (Minor)</label><input type="number" id="ded_warningA" value="${appSettings.deductions.warningA}" min="0" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">Warning Type B (Major)</label><input type="number" id="ded_warningB" value="${appSettings.deductions.warningB}" min="0" style="${inputStyle}"></div>
                                    <div><label style="${labelStyle}">Warning Type C (Serious)</label><input type="number" id="ded_warningC" value="${appSettings.deductions.warningC}" min="0" style="${inputStyle}"></div>
                                </div>
                                <button onclick="saveDeductions()" style="margin-top:14px;background:linear-gradient(135deg,#0055b3,#00bfff);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Save Deductions</button>
                            </div>

                            <div style="${sectionStyle}">
                                <h2 style="font-size:18px;font-weight:700;color:#7dd3fc;margin-bottom:14px;">📊 System Actions</h2>
                                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                    <button onclick="exportSystemData()" style="background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;"><i class="fas fa-download" style="margin-right:6px;"></i>Export All Data</button>
                                    <button onclick="resetSystemData()" style="background:linear-gradient(135deg,#b91c1c,#ef4444);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;"><i class="fas fa-trash" style="margin-right:6px;"></i>Reset Ratings</button>
                                </div>
                                <p style="font-size:12px;color:#334155;margin-top:10px;">Reset only deletes ratings & HR records. User accounts remain.</p>
                            </div>
                        </div>
                    </div>`;
                } catch(e) {
                    console.error(e);
                    showToast('Failed to load admin panel: ' + e.message, true);
                    document.getElementById('app').innerHTML = `${renderNavbar('admin')}<div style="text-align:center;padding:40px;color:#fca5a5;">Error loading admin panel. <button onclick="showAdminPanel()" style="margin-top:12px;background:rgba(0,191,255,0.15);color:#00bfff;border:1px solid rgba(0,191,255,0.3);border-radius:8px;padding:8px 16px;cursor:pointer;">Retry</button></div>`;
                }
            };

            function parseCSV(text) {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (inQuotes) {
                        if (char === '"') {
                            if (text[i+1] === '"') { currentField += '"'; i++; }
                            else { inQuotes = false; }
                        } else { currentField += char; }
                    } else {
                        if (char === '"') { inQuotes = true; }
                        else if (char === ',') { currentRow.push(currentField.trim()); currentField = ''; }
                        else if (char === '\n' || char === '\r') {
                            if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); currentRow = []; currentField = ''; }
                            if (char === '\r' && text[i+1] === '\n') i++;
                        } else { currentField += char; }
                    }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                return rows;
            }

            window.importUsersFromCSV = async () => {
                const file = document.getElementById('csvFileInput').files[0];
                if(!file) return showToast('Select a CSV file first',true);
                const resultEl = document.getElementById('importResult');
                const csvText = await new Promise((resolve, reject) => {
                    const r = new FileReader();
                    r.onload = (e) => resolve(e.target.result);
                    r.onerror = () => reject(new Error('Failed to read file'));
                    r.readAsText(file);
                });
                const lines = parseCSV(csvText);
                if(lines.length < 2) return showToast('CSV must have a header row',true);
                const headers = lines[0].map(h => h.toLowerCase().trim());
                if(!['name','email','role','company'].every(r => headers.includes(r))) {
                    return showToast('CSV must have columns: Name, Email, Role, Company', true);
                }
                let created=0, failed=0, failedList=[];
                resultEl.innerHTML = `<span style="color:#38bdf8;">Importing... (${lines.length-1} records)</span>`;
                for(let i=1;i<lines.length;i++){
                    const vals = lines[i];
                    if(vals.length < headers.length) continue;
                    const rec = {};
                    headers.forEach((h,idx) => rec[h] = vals[idx] || '');
                    const pass = rec.password||'password123';
                    try {
                        await createUser(rec.email,pass,rec.name,rec.company,rec.role);
                        created++;
                        resultEl.innerHTML = `<span style="color:#38bdf8;">Importing... ${created} created so far</span>`;
                    } catch(err) {
                        failed++;
                        failedList.push(rec.email || `Row ${i+1}`);
                        console.error('Import row failed:',err);
                    }
                }
                resultEl.innerHTML = `<span style="color:#34d399;">✅ Created: ${created}</span> &nbsp; <span style="color:#f87171;">❌ Failed: ${failed}</span>${failedList.length?`<div style="color:#f87171;font-size:12px;margin-top:6px;">Failed: ${failedList.join(', ')}</div>`:''}`;
                showToast(`Import complete: ${created} users created`);
            };

            window.addCompany = () => {
                const div=document.createElement('div');
                div.style.cssText='display:flex;gap:10px;margin-bottom:10px;';
                div.innerHTML='<input type="text" class="company-input" placeholder="Company Name" style="flex:1;padding:10px 14px;font-size:14px;border-radius:10px;"><button onclick="removeCompany(this)" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:6px 12px;cursor:pointer;white-space:nowrap;">✕</button>';
                document.getElementById('companiesList').appendChild(div);
            };
            window.removeCompany = (btn) => btn.parentElement.remove();
            window.saveCompanies = () => { const comps=[]; document.querySelectorAll('.company-input').forEach(i=>{ if(i.value.trim()) comps.push(i.value.trim()); }); appSettings.companies=comps; saveSettings(); showToast('Companies saved'); renderDashboard(); };
            window.saveWeights = () => {
                const op=parseFloat(document.getElementById('opWeight').value);
                const hr=parseFloat(document.getElementById('hrWeight').value);
                if(Math.abs((op+hr)-1.0)>0.01) return showToast('Weights must add up to 1.0',true);
                appSettings.operationWeight=op; appSettings.hrWeight=hr; saveSettings(); showToast('Weights saved');
            };
            window.saveDeductions = () => {
                appSettings.deductions = {
                    late: parseInt(document.getElementById('ded_late').value)||0,
                    npsl: parseInt(document.getElementById('ded_npsl').value)||0,
                    npl: parseInt(document.getElementById('ded_npl').value)||0,
                    awol: parseInt(document.getElementById('ded_awol').value)||0,
                    warningA: parseInt(document.getElementById('ded_warningA').value)||0,
                    warningB: parseInt(document.getElementById('ded_warningB').value)||0,
                    warningC: parseInt(document.getElementById('ded_warningC').value)||0
                };
                saveSettings(); showToast('Deductions saved');
            };

            window.exportSystemData = async () => {
                try {
                    const ratings = await db.collection('ratings').get();
                    const users = await db.collection('users').get();
                    const hrRecs = await db.collection('hrRecords').get();
                    const data = {
                        exportDate: new Date().toISOString(),
                        users: users.docs.map(d=>({id:d.id,...d.data()})),
                        ratings: ratings.docs.map(d=>({id:d.id,...d.data()})),
                        hrRecords: hrRecs.docs.map(d=>({id:d.id,...d.data()}))
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href=url; a.download=`appraisal_system_export_${new Date().toISOString().split('T')[0]}.json`; a.click();
                    URL.revokeObjectURL(url);
                    showToast('Export complete ✅');
                } catch(e) { showToast('Export failed: ' + e.message, true); }
            };

            window.resetSystemData = async () => {
                if(!confirm('⚠️ This will delete ALL ratings and HR records. User accounts will NOT be deleted. Continue?')) return;
                showLoading();
                const ratings = await db.collection('ratings').get();
                const hrRecs  = await db.collection('hrRecords').get();
                const allDocs = [...ratings.docs, ...hrRecs.docs];
                for(let i=0;i<allDocs.length;i+=400){
                    const batch=db.batch();
                    allDocs.slice(i,i+400).forEach(d=>batch.delete(d.ref));
                    await batch.commit();
                }
                showToast('All ratings and HR data have been reset');
                renderDashboard();
            };

            // ── INIT ──
            function setStatus(msg) { const el=document.getElementById('loadingStatus'); if(el) el.innerText=msg; }

            setStatus('Waiting for Firebase Auth...');
            auth.onAuthStateChanged(async (user) => {
                try {
                    if(user) {
                        setStatus('User found, loading profile...');
                        const doc = await db.collection('users').doc(user.uid).get();
                        if(doc.exists) {
                            currentUserData = { id:doc.id,...doc.data() };
                            currentUser = user;
                            setStatus('Loading settings...');
                            await loadSettings();
                            setStatus('Loading notifications...');
                            await fetchNotifications();
                            setStatus('Rendering dashboard...');
                            renderDashboard();
                        } else {
                            setStatus('No profile found, signing out...');
                            await auth.signOut();
                            renderLogin();
                        }
                    } else {
                        setStatus('No session, showing login...');
                        renderLogin();
                    }
                } catch(e) {
                    console.error('Auth state error:',e);
                    const errEl=document.getElementById('loadingError');
                    if(errEl) { errEl.style.display='block'; errEl.innerText='❌ ' + (e.message || e); }
                    setTimeout(renderLogin,2000);
                }
            });
        })();
    </script>
</body>
</html>
